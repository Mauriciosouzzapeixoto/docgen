<!DOCTYPE html>
<html>
<head>
    <title>Favicon Generator</title>
</head>
<body>
    <canvas id="faviconCanvas" width="32" height="32" style="display:none;"></canvas>
    <script>
        const canvas = document.getElementById('faviconCanvas');
        const ctx = canvas.getContext('2d');
        
        // Criar gradiente de fundo
        const gradient = ctx.createLinearGradient(0, 0, 32, 32);
        gradient.addColorStop(0, '#667eea');
        gradient.addColorStop(1, '#764ba2');
        
        // Desenhar círculo de fundo
        ctx.fillStyle = gradient;
        ctx.beginPath();
        ctx.arc(16, 16, 15, 0, 2 * Math.PI);
        ctx.fill();
        
        // Borda branca
        ctx.strokeStyle = '#fff';
        ctx.lineWidth = 1;
        ctx.stroke();
        
        // Desenhar ícone de documento
        ctx.fillStyle = 'rgba(255, 255, 255, 0.9)';
        ctx.fillRect(10, 8, 12, 16);
        
        // Dobra do documento
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.beginPath();
        ctx.moveTo(18, 8);
        ctx.lineTo(22, 8);
        ctx.lineTo(18, 12);
        ctx.closePath();
        ctx.fill();
        
        // Linhas de texto
        ctx.fillStyle = 'rgba(255, 255, 255, 0.7)';
        ctx.fillRect(12, 14, 8, 1);
        ctx.fillRect(12, 16, 6, 1);
        ctx.fillRect(12, 18, 7, 1);
        ctx.fillRect(12, 20, 5, 1);
        
        // Pontos decorativos
        ctx.fillStyle = 'rgba(255, 255, 255, 0.8)';
        ctx.beginPath();
        ctx.arc(14, 12, 0.5, 0, 2 * Math.PI);
        ctx.fill();
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.6)';
        ctx.beginPath();
        ctx.arc(16, 12, 0.5, 0, 2 * Math.PI);
        ctx.fill();
        
        ctx.fillStyle = 'rgba(255, 255, 255, 0.4)';
        ctx.beginPath();
        ctx.arc(18, 12, 0.5, 0, 2 * Math.PI);
        ctx.fill();
        
        // Converter para favicon.ico
        canvas.toBlob(function(blob) {
            const url = URL.createObjectURL(blob);
            const link = document.createElement('a');
            link.href = url;
            link.download = 'favicon.ico';
            link.click();
            URL.revokeObjectURL(url);
        }, 'image/x-icon');
    </script>
</body>
</html>
